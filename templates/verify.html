<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Identity</title>
    <link href="/static/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <h1>Verify Your Identity</h1>
    </header>
    <nav>
        <a href="/">Home</a>
        <a href="/verify">Verify</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/api-docs">API Docs</a>
        <a href="/about">About</a>
    </nav>
    <main class="container">
        <div class="card">
            <h2>Verify Your Identity</h2>
            <form id="verify-form">
                <div class="mb-3">
                    <label for="user_id" class="form-label">User ID</label>
                    <input type="text" class="form-control" id="user_id" required>
                </div>
                <div class="mb-3">
                    <label for="submitted_data" class="form-label">Identity Data</label>
                    <textarea class="form-control" id="submitted_data" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Submit</button>
            </form>
        </div>
    </main>
    <footer>
        <p>&copy; 2023 Decentralized Identity Verification System</p>
    </footer>
    <script src="/static/js/main.js"></script>
</body>
</html>
